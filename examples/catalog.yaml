# Example trusted action pin catalog for gh-actionpins.
# Copy to ~/.config/actionpins/catalog.yaml (or pass --catalog) and edit.
#
# Typical loop:
#   gh actionpins catalog validate --catalog examples/catalog.yaml
#   gh actionpins scan
#   gh actionpins diff  --catalog examples/catalog.yaml
#   gh actionpins apply --catalog examples/catalog.yaml --dry-run
#   gh actionpins apply --catalog examples/catalog.yaml
#
# Fleet (--all) uses the optional repos: list below:
#   gh actionpins scan  --all --catalog ~/.config/actionpins/catalog.yaml
#   gh actionpins diff  --all --catalog ~/.config/actionpins/catalog.yaml
#   gh actionpins apply --all --dry-run --catalog ~/.config/actionpins/catalog.yaml

actions:
  actions/checkout:
    version: v7.0.0
    sha: 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    approved_at: 2026-06-01
  actions/setup-go:
    version: v6.5.0
    sha: 924ae3a1cded613372ab5595356fb5720e22ba16
    approved_at: 2026-06-01
  golangci/golangci-lint-action:
    version: v9.3.0
    sha: ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
    approved_at: 2026-06-01

policy:
  # Soak time before a release is eligible for propose-bump (see check-updates).
  min_age: 7d
  # major | same-major | patch-only
  prefer: major
  # Keep "# vX.Y.Z" annotations on uses: lines when applying pins.
  require_comment: true

# Managed fleet for scan/diff/apply --all.
# Model: each entry is a local checkout. path is required; name is optional
# owner/name identity for display only (no remote access).
# Inventory is discovery-based: a repo is only rewritten for actions it
# already uses — unused catalog entries are never injected.
#
# Uncomment and set real paths to enable --all:
# repos:
#   - path: /absolute/path/to/repo-a
#   - name: owner/repo-b
#     path: ~/src/owner/repo-b
