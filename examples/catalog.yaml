# Example trusted action pin catalog for gh-actionpins.
# Copy to ~/.config/actionpins/catalog.yaml (or pass --catalog) and edit.
#
# Typical loop:
#   gh actionpins catalog validate --catalog examples/catalog.yaml
#   gh actionpins scan
#   gh actionpins diff  --catalog examples/catalog.yaml
#   gh actionpins apply --catalog examples/catalog.yaml --dry-run
#   gh actionpins apply --catalog examples/catalog.yaml

actions:
  actions/checkout:
    version: v7.0.0
    sha: 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    approved_at: 2026-06-01
  actions/setup-go:
    version: v6.5.0
    sha: 924ae3a1cded613372ab5595356fb5720e22ba16
    approved_at: 2026-06-01
  golangci/golangci-lint-action:
    version: v9.3.0
    sha: ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
    approved_at: 2026-06-01

policy:
  # Soak time before a release is eligible for propose-bump (see check-updates).
  min_age: 7d
  # major | same-major | patch-only
  prefer: major
  # Keep "# vX.Y.Z" annotations on uses: lines when applying pins.
  require_comment: true
